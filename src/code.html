        // Render functions
        function drawBackground(w, h) {
          const bgImg = assetCache.images['background_sky'];
          if (bgImg) {
            ctx.drawImage(bgImg, 0, 0, w, h);
          } else {
            const gradient = ctx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, '#B3E5FC');
            gradient.addColorStop(1, '#E1F5FE');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);
          }

          // Distant Mesa Cliffs (like the screenshot) - Lighter
          ctx.fillStyle = 'rgba(144, 202, 249, 0.4)';
          ctx.beginPath();
          ctx.moveTo(0, h);
          ctx.lineTo(0, h - 450);
          ctx.bezierCurveTo(w * 0.2, h - 450, w * 0.3, h - 600, w * 0.5, h - 550);
          ctx.bezierCurveTo(w * 0.7, h - 500, w * 0.8, h - 650, w, h - 600);
          ctx.lineTo(w, h);
          ctx.fill();

          // Mid-ground Lush Hills
          ctx.fillStyle = 'rgba(129, 199, 132, 0.5)';
          ctx.beginPath();
          ctx.moveTo(0, h);
          ctx.lineTo(0, h - 350);
          ctx.quadraticCurveTo(w * 0.25, h - 450, w * 0.5, h - 350);
          ctx.quadraticCurveTo(w * 0.75, h - 250, w, h - 350);
          ctx.lineTo(w, h);
          ctx.fill();

          // Round cartoon trees (like in screenshot)
          function drawTree(x, y, size) {
            ctx.fillStyle = '#4DB6AC';
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            // Trunk
            ctx.fillStyle = '#4E342E';
            ctx.fillRect(x - size * 0.1, y + size * 0.8, size * 0.2, size * 0.5);
          }

          drawTree(w * 0.2, h - 380, 80);
          drawTree(w * 0.6, h - 420, 100);
          drawTree(w * 0.85, h - 370, 70);

          // River at the bottom
          ctx.fillStyle = 'rgba(129, 212, 250, 0.4)';
          ctx.beginPath();
          ctx.moveTo(0, h - 100);
          ctx.bezierCurveTo(w * 0.3, h - 60, w * 0.7, h - 140, w, h - 80);
          ctx.lineTo(w, h);
          ctx.lineTo(0, h);
          ctx.fill();

          // Draw clouds (animated)
          ctx.fillStyle = 'rgba(255, 255, 255, 1)';
          clouds.forEach((cloud) => {
            if (gameState === 'playing' || gameState === 'menu') {
              cloud.x += cloud.speed;
              if (cloud.x > CANVAS_WIDTH + 100) cloud.x = -200;
            }

            ctx.save();
            ctx.globalAlpha = cloud.opacity;
            const cx = cloud.x;
            const cy = cloud.y;
            const cs = cloud.size;

            ctx.beginPath();
            ctx.arc(cx, cy, cs * 0.4, 0, Math.PI * 2);
            ctx.arc(cx + cs * 0.3, cy - cs * 0.1, cs * 0.3, 0, Math.PI * 2);
            ctx.arc(cx + cs * 0.5, cy + cs * 0.1, cs * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
        }

        function drawGround(w, h) {
          const levelData = window.gameConfig.levels[currentLevelIndex];

          if (levelData.terrain && levelData.terrain.length > 1) {
            const segmentWidth = CANVAS_WIDTH / (levelData.terrain.length - 1);

            // Dirt Mass (Stepped Cliff Feel)
            ctx.fillStyle = '#73503C';
            ctx.beginPath();
            ctx.moveTo(-500, h + 1000); // Start way below and to the left
            ctx.lineTo(-500, levelData.terrain[0] + currentYOffset);
            for (let i = 0; i < levelData.terrain.length; i++) {
              const ty = levelData.terrain[i] + currentYOffset;
              const tx = i * segmentWidth;
              if (i > 0) {
                ctx.lineTo(tx, levelData.terrain[i - 1] + currentYOffset);
              }
              ctx.lineTo(tx, ty);
            }
            ctx.lineTo(w + 500, levelData.terrain[levelData.terrain.length - 1] + currentYOffset);
            ctx.lineTo(w + 500, h + 1000);
            ctx.fill();

            // Grass top (Stepped)
            ctx.strokeStyle = '#76B34A';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'miter';
            ctx.beginPath();
            ctx.moveTo(-100, levelData.terrain[0] + currentYOffset);
            for (let i = 0; i < levelData.terrain.length; i++) {
              const ty = levelData.terrain[i] + currentYOffset;
              const tx = i * segmentWidth;
              ctx.lineTo(
                tx,
                levelData.terrain[i - 1] !== undefined
                  ? levelData.terrain[i - 1] + currentYOffset
                  : ty
              );
              ctx.lineTo(tx, ty);
            }
            ctx.lineTo(w + 100, levelData.terrain[levelData.terrain.length - 1] + currentYOffset);
            ctx.stroke();

            // Decorative details: grass clumps and rocks
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            for (let i = 0; i < levelData.terrain.length - 1; i++) {
              const ty = levelData.terrain[i] + currentYOffset;
              const tx = i * segmentWidth;
              // Shadow under grass
              ctx.fillRect(tx, ty + 10, segmentWidth, 15);
              // Randomized rocks in dirt
              if (i % 4 === 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(tx + 20, ty + 60, 30, 15);
              }
            }
          } else {
            const groundY = levelData.groundY + currentYOffset;
            // Grass
            ctx.fillStyle = '#90C088';
            ctx.fillRect(0, groundY, w, 20);
            // Dirt
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, groundY + 20, w, h - groundY);
          }
        }

        function drawSlingshot() {
          const slingshotImg = assetCache.images['slingshot_frame'];

          const slingshotDrawX = SLINGSHOT_X - 50;
          const slingshotDrawY = slingshotY - 110;
          const slingshotWidth = 100;
          const slingshotHeight = 130;

          // Draw back elastic band
          if (slingshotState.hasBird) {
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(SLINGSHOT_X - 22, slingshotY - 60);
            ctx.lineTo(slingshotState.birdX, slingshotState.birdY);
            ctx.stroke();
          }

          // Draw slingshot frame
          if (slingshotImg) {
            ctx.drawImage(
              slingshotImg,
              slingshotDrawX,
              slingshotDrawY,
              slingshotWidth,
              slingshotHeight
            );
          } else {
            // Fallback slingshot
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(slingshotDrawX + 35, slingshotDrawY, 10, slingshotHeight);
            ctx.fillRect(slingshotDrawX + 55, slingshotDrawY, 10, slingshotHeight);
            ctx.fillRect(slingshotDrawX + 35, slingshotDrawY + slingshotHeight - 20, 30, 20);
          }

          // Draw front elastic band
          if (slingshotState.hasBird) {
            ctx.strokeStyle = '#301608';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(SLINGSHOT_X + 22, slingshotY - 60);
            ctx.lineTo(slingshotState.birdX, slingshotState.birdY);
            ctx.stroke();
          }
        }

        function drawBird() {
          // Draw bird in slingshot
          if (slingshotState.hasBird) {
            let size = 50;
            if (isPowerShotActive) size *= 1.5;
            if (isWingmanActive) size = 100;

            const x = slingshotState.birdX;
            const y = slingshotState.birdY;

            let birdImgId = 'red_bird';
            if (isWingmanActive) {
              birdImgId = 'black_bird';
            } else {
              const types = [
                'red',
                'blue',
                'yellow',
                'black',
                'pink',
                'brown',
                'orange',
                'green',
                'purple',
              ];
              const birdTypeIndex =
                window.gameConfig.levels[currentLevelIndex].birdsAvailable - birdsRemaining;
              const birdType = types[birdTypeIndex % types.length];
              birdImgId = birdType + '_bird';
            }

            const birdImg = assetCache.images[birdImgId] || assetCache.images['red_bird'];

            if (birdImg) {
              const aspect = birdImg.width / birdImg.height;
              const width = size * aspect;
              ctx.drawImage(birdImg, x - width / 2, y - size / 2, width, size);

              if (isWingmanActive) {
                ctx.strokeStyle = 'gold';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(x, y, size / 2 + 2, 0, Math.PI * 2);
                ctx.stroke();
              }
            } else {
              // Fallback bird
              ctx.fillStyle = '#E74C3C';
              ctx.beginPath();
              ctx.arc(x, y, size / 2, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = '#333';
              ctx.lineWidth = 3;
              ctx.stroke();
            }
          }

          // Draw launched bird
          if (bird) {
            const x = bird.position.x;
            const y = bird.position.y;
            const radius = bird.gameData.radius || 25;
            const size = radius * 2;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(bird.angle);

            // Use specific bird image
            let birdImgName = bird.gameData.birdType + '_bird';
            if (bird.gameData.birdType === 'wingman') birdImgName = 'black_bird';

            const birdTypeImg = assetCache.images[birdImgName] || assetCache.images['red_bird'];

            if (birdTypeImg) {
              const aspect = birdTypeImg.width / birdTypeImg.height;
              const width = size * aspect;
              ctx.drawImage(birdTypeImg, -width / 2, -size / 2, width, size);

              // Add Wingman helmet or glow
              if (bird.gameData.birdType === 'wingman') {
                ctx.strokeStyle = 'gold';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, 0, size / 2 + 2, 0, Math.PI * 2);
                ctx.stroke();
              }
            } else {
              const colors = {
                red: '#E74C3C',
                blue: '#3498DB',
                yellow: '#F1C40F',
                black: '#2C3E50',
                green: '#27AE60',
                pink: '#FF69B4',
                orange: '#E67E22',
                brown: '#8B4513',
                purple: '#8E44AD',
              };
              ctx.fillStyle = colors[bird.gameData.birdType] || '#E74C3C';
              ctx.beginPath();
              ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = '#333';
              ctx.lineWidth = 3;
              ctx.stroke();
            }
            ctx.restore();
          }

          // Draw birds waiting on the ground
          const types = [
            'red',
            'blue',
            'yellow',
            'black',
            'pink',
            'brown',
            'orange',
            'green',
            'purple',
          ];
          const waitingBirds = birdsRemaining - (slingshotState.hasBird ? 1 : 0);
          for (let i = 0; i < waitingBirds; i++) {
            const birdIdx =
              window.gameConfig.levels[currentLevelIndex].birdsAvailable -
              birdsRemaining +
              i +
              (slingshotState.hasBird ? 1 : 0);
            const birdType = types[birdIdx % types.length];
            const birdImg = assetCache.images[birdType + '_bird'] || assetCache.images['red_bird'];
            const size = 40;
            const bx = SLINGSHOT_X - 100 - i * 45;
            const by = getGroundHeightAt(bx) - size / 2;

            if (birdImg) {
              const aspect = birdImg.width / birdImg.height;
              const width = size * aspect;
              ctx.drawImage(birdImg, bx - width / 2, by - size / 2, width, size);
            }
          }
        }

        function useBirdAbility() {
          if (!bird || bird.gameData.hasUsedAbility || bird.gameData.hasCollided) return;

          const type = bird.gameData.birdType;
          bird.gameData.hasUsedAbility = true;

          if (type === 'yellow') {
            // Super speed boost
            const vel = bird.velocity;
            Body.setVelocity(bird, { x: vel.x * 4.0, y: vel.y * 2.0 });
            playSound('bird_launch_sfx');
          } else if (type === 'blue') {
            // Precision dash
            const vel = bird.velocity;
            Body.setVelocity(bird, { x: vel.x * 3.0, y: vel.y });
            playSound('bird_launch_sfx');
          } else if (type === 'black') {
            // Massive Explosion
            explode(bird.position.x, bird.position.y, 500, 0.4);
            World.remove(world, bird);
            bird = null;
          } else if (type === 'pink') {
            // Drop TNT
            dropTNT(bird.position.x, bird.position.y + 40);
            // Give bird a little lift
            Body.setVelocity(bird, { x: bird.velocity.x, y: bird.velocity.y - 5 });
          } else if (type === 'brown') {
            // Heavy Mode - increase mass and size
            Body.scale(bird, 2, 2);
            Body.setMass(bird, bird.mass * 10);
            bird.gameData.radius *= 2;
          } else if (type === 'orange') {
            // Expand and push
            Body.scale(bird, 3, 3);
            Body.setMass(bird, bird.mass * 5);
            explode(bird.position.x, bird.position.y, 150, 0.05);
          } else if (type === 'purple') {
            // Forward Teleport (Extra force)
            const vel = bird.velocity;
            const forwardX = (vel.x / Math.sqrt(vel.x * vel.x + vel.y * vel.y)) * 150;
            const forwardY = (vel.y / Math.sqrt(vel.x * vel.x + vel.y * vel.y)) * 150;
            Body.setPosition(bird, {
              x: bird.position.x + forwardX,
              y: bird.position.y + forwardY,
            });
            playSound('bird_launch_sfx');
          } else {
            // Standard boost for others
            const vel = bird.velocity;
            Body.setVelocity(bird, { x: vel.x * 1.5, y: vel.y * 1.5 });
            playSound('bird_launch_sfx');
          }
        }

        function dropTNT(x, y, isParachute = false) {
          const material = MATERIALS.tnt;
          const tntBody = Bodies.rectangle(x, y, 60, 60, {
            density: material.density,
            friction: material.friction,
            restitution: material.restitution,
            label: 'block',
            frictionAir: isParachute ? 0.06 : 0.01, // FASTER DESCENT
          });
          tntBody.gameData = {
            type: 'block',
            material: 'tnt',
            health: material.health,
            width: 60,
            height: 60,
            isParachute: isParachute,
            isExploded: false,
          };
          World.add(world, tntBody);
          blocks.push({ body: tntBody, data: { material: 'tnt', width: 60, height: 60 } });

          // Set a timer to explode if it doesn't hit something (backup)
          setTimeout(() => {
            if (
              tntBody &&
              Composite.allBodies(world).includes(tntBody) &&
              !tntBody.gameData.isExploded
            ) {
              tntBody.gameData.isExploded = true;
              explode(tntBody.position.x, tntBody.position.y, 300, 0.15);
              destroyBlock(tntBody);
            }
          }, 10000);
        }

        function explode(x, y, radius = 180, force = 0.08) {
          // Play explosion sound
          playSound('tnt_explosion_sfx');

          // Add visual explosion effect
          explosions.push({
            x: x,
            y: y,
            radius: radius,
            currentRadius: 10,
            life: 1.0,
            color: 'rgba(255, 100, 0, 0.6)',
          });

          shakeAmount = Math.min(shakeAmount + radius / 10, 50);

          createImpactParticles(x, y, 'dust');
          createImpactParticles(x, y, 'wood');

          const bodies = Composite.allBodies(world);
          bodies.forEach((body) => {
            const dx = body.position.x - x;
            const dy = body.position.y - y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < radius && !body.isStatic) {
              // Increase push force for a more effective blast
              const pushForce = (1 - dist / radius) * force * 1.5;
              Body.applyForce(body, body.position, {
                x: (dx / dist) * pushForce,
                y: (dy / dist) * pushForce,
              });

              if (body.gameData) {
                // Significantly increase damage (was 150)
                const damage = 500 * Math.pow(1 - dist / radius, 1.2);
                body.gameData.health -= damage;

                if (body.gameData.health <= 0) {
                  if (body.gameData.type === 'block') destroyBlock(body);
                  else if (body.gameData.type === 'pig') destroyPig(body);
                }
              }
            }
          });
        }
        function drawTrajectory() {
          if (!slingshotState.isDragging || !slingshotState.hasBird) return;

          const pullX = SLINGSHOT_X - slingshotState.birdX;
          const pullY = slingshotY - slingshotState.birdY;
          const pullDist = Math.sqrt(pullX * pullX + pullY * pullY);

          if (pullDist < MIN_PULL_DISTANCE) return;

          const power =
            (isKingSlingActive
              ? window.gameConfig.settings.slingshotPower * 1.6
              : window.gameConfig.settings.slingshotPower) * LAUNCH_POWER;
          const vx = pullX * power;
          const vy = pullY * power;
          const gravity = window.gameConfig.settings.gravity * 0.001;

          ctx.fillStyle = isSlingScopeActive
            ? 'rgba(255, 255, 0, 0.8)'
            : 'rgba(255, 255, 255, 0.7)';
          const dotCount = isSlingScopeActive ? 25 : 7;
          for (let i = 0; i < dotCount; i++) {
            const t = i * 8;
            const px = slingshotState.birdX + vx * t;
            const py = slingshotState.birdY + vy * t + 0.5 * gravity * t * t;

            const groundYValue = getGroundHeightAt(px);
            if (py > groundYValue) break;

            ctx.beginPath();
            const radius = Math.max(0.1, 5 - i * 0.5);
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function drawBlocks() {
          blocks.forEach((block) => {
            const body = block.body;
            const material = MATERIALS[body.gameData.material];
            const vertices = body.vertices;

            ctx.save();
            ctx.beginPath();
            ctx.moveTo(vertices[0].x, vertices[0].y);
            for (let i = 1; i < vertices.length; i++) {
              ctx.lineTo(vertices[i].x, vertices[i].y);
            }
            ctx.closePath();

            ctx.fillStyle = material.color;
            ctx.fill();

            if (body.gameData.material === 'tnt') {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
              ctx.font = `bold ${Math.min(body.gameData.width, body.gameData.height) * 0.6}px Arial`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText('TNT', body.position.x, body.position.y);
            }

            // Draw parachute or balloons if applicable
            if (body.gameData.isParachute || body.gameData.hasBalloons) {
              ctx.save();

              if (body.gameData.hasBalloons && !body.gameData.isParachute) {
                // Draw colorful balloons
                const balloonColors = ['#FFEB3B', '#F44336', '#2196F3', '#E91E63'];
                const balloonCount = 3;
                for (let i = 0; i < balloonCount; i++) {
                  const bx = body.position.x + (i - 1) * 35;
                  const by = body.position.y - 100;

                  // String
                  ctx.beginPath();
                  ctx.moveTo(body.position.x, body.position.y - 10);
                  ctx.lineTo(bx, by);
                  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                  ctx.lineWidth = 1.5;
                  ctx.stroke();

                  // Balloon
                  ctx.beginPath();
                  ctx.ellipse(bx, by, 18, 24, 0, 0, Math.PI * 2);
                  ctx.fillStyle = balloonColors[(body.id + i) % balloonColors.length];
                  ctx.fill();
                  ctx.strokeStyle = '#333';
                  ctx.lineWidth = 1.5;
                  ctx.stroke();

                  // Shine
                  ctx.beginPath();
                  ctx.ellipse(bx - 6, by - 8, 4, 6, Math.PI / 4, 0, Math.PI * 2);
                  ctx.fillStyle = 'rgba(255,255,255,0.4)';
                  ctx.fill();
                }
              } else if (body.gameData.isParachute) {
                ctx.translate(body.position.x, body.position.y - 30);

                // Parachute Canopy - Scalloped edge look
                ctx.beginPath();
                ctx.moveTo(-60, 0);
                ctx.bezierCurveTo(-60, -80, 60, -80, 60, 0);
                ctx.lineTo(40, 0);
                ctx.bezierCurveTo(40, -15, 20, -15, 20, 0);
                ctx.lineTo(0, 0);
                ctx.bezierCurveTo(0, -15, -20, -15, -20, 0);
                ctx.lineTo(-40, 0);
                ctx.bezierCurveTo(-40, -15, -60, -15, -60, 0);
                ctx.closePath();

                ctx.fillStyle = '#E74C3C'; // Classic red parachute
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Multiple Strings connecting to the box
                ctx.beginPath();
                ctx.moveTo(-60, 0);
                ctx.lineTo(-15, 30);
                ctx.moveTo(-30, 0);
                ctx.lineTo(-5, 30);
                ctx.moveTo(30, 0);
                ctx.lineTo(5, 30);
                ctx.moveTo(60, 0);
                ctx.lineTo(15, 30);
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 1;
                ctx.stroke();
              }

              ctx.restore();
            }

            ctx.strokeStyle = material.strokeColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            if (isEditMode && editState.selectedObject && editState.selectedObject.ref === block) {
              ctx.strokeStyle = '#9B59B6';
              ctx.lineWidth = 4;
              ctx.setLineDash([5, 5]);
              ctx.stroke();
              ctx.setLineDash([]);
            }
            ctx.restore();
          });
        }

        function drawPigs() {
          const pigImg = assetCache.images['small_pig'];

          pigs.forEach((pig) => {
            const body = pig.body;
            const x = body.position.x;
            const y = body.position.y;
            const radius = body.gameData.radius;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(body.angle);

            if (pigImg) {
              const aspect = pigImg.width / pigImg.height;
              const width = radius * 2 * aspect;
              const height = radius * 2;
              ctx.drawImage(pigImg, -width / 2, -height / 2, width, height);
            } else {
              ctx.fillStyle = '#7FCD3D';
              ctx.beginPath();
              ctx.arc(0, 0, radius, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();

            // Draw balloons for floating pigs
            if (body.gameData.hasBalloons) {
              ctx.save();
              const balloonColors = ['#4CAF50', '#8BC34A', '#CDDC39'];
              const bx = x;
              const by = y - radius - 50;

              // String
              ctx.beginPath();
              ctx.moveTo(x, y - radius);
              ctx.lineTo(bx, by);
              ctx.strokeStyle = 'rgba(255,255,255,0.6)';
              ctx.lineWidth = 1.5;
              ctx.stroke();

              // Balloon
              ctx.beginPath();
              ctx.ellipse(bx, by, 15, 20, 0, 0, Math.PI * 2);
              ctx.fillStyle = balloonColors[body.id % balloonColors.length];
              ctx.fill();
              ctx.strokeStyle = '#333';
              ctx.lineWidth = 1;
              ctx.stroke();
              ctx.restore();
            }

            // Draw health bar
            if (body.gameData.health < body.gameData.maxHealth || gameState === 'playing') {
              const barWidth = radius * 2.5;
              const barHeight = 8;
              const barX = x - barWidth / 2;
              const barY = y - radius - 15;

              // Background
              ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
              ctx.fillRect(barX, barY, barWidth, barHeight);

              // Health
              const healthPercent = Math.max(0, body.gameData.health / body.gameData.maxHealth);
              ctx.fillStyle =
                healthPercent > 0.5 ? '#2ECC71' : healthPercent > 0.25 ? '#F1C40F' : '#E74C3C';
              ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);

              // Border
              ctx.strokeStyle = '#333';
              ctx.lineWidth = 1;
              ctx.strokeRect(barX, barY, barWidth, barHeight);
            }

            if (isEditMode && editState.selectedObject && editState.selectedObject.ref === pig) {
              ctx.strokeStyle = '#9B59B6';
              ctx.lineWidth = 4;
              ctx.setLineDash([5, 5]);
              ctx.beginPath();
              ctx.arc(x, y, radius + 5, 0, Math.PI * 2);
              ctx.stroke();
              ctx.setLineDash([]);
            }
          });
        }

        function drawParticles() {
          particles = particles.filter((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            p.life -= 0.02;
            if (p.life <= 0) return false;

            const alpha = p.life;
            const size = p.size * p.life;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.globalAlpha = alpha;

            let particleImg;
            if (p.type === 'wood') particleImg = assetCache.images['wood_debris_particle'];
            else if (p.type === 'glass') particleImg = assetCache.images['glass_shard_particle'];
            else particleImg = assetCache.images['dust_particle'];

            if (particleImg) {
              ctx.drawImage(particleImg, -size / 2, -size / 2, size, size);
            } else {
              ctx.fillStyle = '#fff';
              ctx.beginPath();
              ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
            return true;
          });
        }

        // Main game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
          const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.11);
          lastTime = timestamp;

          // Update screen shake
          if (shakeAmount > 0) {
            const sx = (Math.random() - 0.5) * shakeAmount;
            const sy = (Math.random() - 0.5) * shakeAmount;
            gameWorld.style.transform = `translate(calc(-50% + ${sx}px), calc(-50% + ${sy}px)) scale(0.5625)`;
            shakeAmount *= 0.9;
            if (shakeAmount < 0.1) {
              shakeAmount = 0;
              gameWorld.style.transform = 'translate(-50%, -50%) scale(0.5625)';
            }
          }

          // Clear canvas
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Calculate scale to maintain aspect ratio 16:9
          const scale = Math.min(canvas.width / CANVAS_WIDTH, canvas.height / CANVAS_HEIGHT);
          const offsetX = (canvas.width - CANVAS_WIDTH * scale) / 2;
          const offsetY = (canvas.height - CANVAS_HEIGHT * scale) / 2;

          ctx.save();
          ctx.translate(offsetX, offsetY);
          ctx.scale(scale, scale);

          // Clip to game area
          ctx.beginPath();
          ctx.rect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          ctx.clip();

          // Draw background
          drawBackground(CANVAS_WIDTH, CANVAS_HEIGHT);

          if (
            gameState === 'playing' ||
            gameState === 'paused' ||
            gameState === 'win' ||
            gameState === 'lose'
          ) {
            // Update physics (only when playing)
            if (gameState === 'playing' && !isEditMode) {
              Engine.update(engine, deltaTime * 1000);

              // Apply balloon buoyancy
              const bodies = Composite.allBodies(world);
              bodies.forEach((body) => {
                if (body.gameData && body.gameData.hasBalloons) {
                  // Counteract gravity
                  const gravity = engine.world.gravity;
                  const antiGravityForce = {
                    x: 0,
                    y: -body.mass * gravity.y * gravity.scale,
                  };
                  Body.applyForce(body, body.position, antiGravityForce);

                  // Add subtle bobbing
                  const bob = Math.sin(Date.now() / 600 + body.id) * 0.0004 * body.mass;
                  Body.applyForce(body, body.position, { x: 0, y: bob });

                  // Drag to prevent drifting away
                  Body.setVelocity(body, {
                    x: body.velocity.x * 0.95,
                    y: body.velocity.y * 0.95,
                  });
                }
              });

              // Check if bird is out of bounds or stopped
              if (bird) {
                const groundYValue = getGroundHeightAt(bird.position.x);
                if (
                  bird.position.x < -100 ||
                  bird.position.x > CANVAS_WIDTH + 100 ||
                  bird.position.y > groundYValue + 100
                ) {
                  checkBirdStatus();
                }
              }
            }

            // Draw game elements (all drawing functions now assume 1280x720 space)
            drawGround(CANVAS_WIDTH, CANVAS_HEIGHT);
            drawBlocks();
            drawPigs();
            drawSlingshot();
            drawBird();
            drawTrajectory();
            drawParticles();
            drawExplosions();
          }

          ctx.restore();
          requestAnimationFrame(gameLoop);
        }

        function drawExplosions() {
          explosions = explosions.filter((exp) => {
            exp.life -= 0.05;
            exp.currentRadius += (exp.radius - exp.currentRadius) * 0.2;

            if (exp.life <= 0) return false;

            ctx.save();
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.currentRadius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
              exp.x,
              exp.y,
              0,
              exp.x,
              exp.y,
              exp.currentRadius
            );
            gradient.addColorStop(0, `rgba(255, 255, 255, ${exp.life})`);
            gradient.addColorStop(0.5, `rgba(255, 200, 0, ${exp.life * 0.8})`);
            gradient.addColorStop(1, `rgba(255, 50, 0, 0)`);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();
            return true;
          });
        }

        // Initialize game
        async function init() {
          await preloadAssets();

          // Load saved progress
          try {
            const savedData = await lib.getUserGameState();
            if (savedData.state && savedData.state.unlockedLevels) {
              playerProgress.unlockedLevels = savedData.state.unlockedLevels;
              lib.log(`Progress loaded: ${savedData.state.unlockedLevels} levels unlocked`);
            } else {
              lib.log('No saved progress found, starting fresh');
              playerProgress.unlockedLevels = 1; // Start with only first level unlocked
            }
          } catch (error) {
            lib.log(`Failed to load progress: ${error.message}`);
            playerProgress.unlockedLevels = 1; // Fallback to first level only
          }

          // Auto-save on page visibility change (user switching tabs or closing)
          document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
              // Page is hidden, save progress
              saveProgress();
            }
          });

          // Auto-save before page unload (best effort)
          window.addEventListener('beforeunload', () => {
            // Note: This is best-effort as browsers limit what can run here
            saveProgress();
          });

          setupUIListeners();

          // Set initial sound icon
          document.getElementById('menu-sound-btn').textContent = window.gameConfig.settings
            .soundEnabled
            ? '🔊'
            : '🔈';

          // Show game parameters
          lib.showGameParameters({
            name: 'Game Settings',
            params: {
              Gravity: {
                key: 'settings.gravity',
                type: 'slider',
                min: 0.5,
                max: 2.0,
                step: 0.1,
              },
              'Slingshot Power': {
                key: 'settings.slingshotPower',
                type: 'slider',
                min: 0.5,
                max: 2.0,
                step: 0.1,
              },
              Sound: {
                key: 'settings.soundEnabled',
                type: 'checkbox',
              },
            },
          });

          if (isEditMode) {
            // Edit mode: Start directly in level 1 for editing
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-hud').classList.remove('hidden');
            document.getElementById('power-ups-bar').classList.remove('hidden');
            document.getElementById('edit-banner').classList.remove('hidden');
            gameState = 'playing';
            loadLevel(0);

            // Add Block/Pig listeners
            document.getElementById('add-block-edit').addEventListener('click', (e) => {
              e.stopPropagation();
              const newBlock = {
                x: 600,
                y: 1000,
                width: 40,
                height: 100,
                material: 'wood',
                angle: 0,
              };
              window.gameConfig.levels[currentLevelIndex].blocks.push(newBlock);
              createBlock(newBlock);
              playSound('button_click_sfx');
            });

            document.getElementById('add-pig-edit').addEventListener('click', (e) => {
              e.stopPropagation();
              const newPig = { x: 600, y: 1000, type: 'medium', health: 150 };
              window.gameConfig.levels[currentLevelIndex].pigs.push(newPig);
              createPig(newPig);
              playSound('button_click_sfx');
            });
          }

          requestAnimationFrame(gameLoop);
        }

        init();
      }
    </script>
  </body>
</html>
